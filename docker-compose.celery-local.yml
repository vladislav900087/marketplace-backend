version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
  redis:
    image: redis:7
  celery-worker:
    build: .
    environment:
      REDIS_URL: redis://redis:6379/0
    command: celery -A app.core.celery_app worker --loglevel=info
    depends_on:
      - redis
    env_file:
      - .env.celery.local

    restart: always